packages:
  - 'apps/*'
  - 'apps/service/pwa'
  - 'packages/*'

# esbuild's postinstall fetches the platform-specific binary; vitest uses esbuild
# for source transforms, so this is required.
allowBuilds:
  better-sqlite3-multiple-ciphers: true
  electron: true
  esbuild: true
  unrs-resolver: set this to true or false
